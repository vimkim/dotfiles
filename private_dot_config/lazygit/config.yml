git:
  log:
  # showWholeGraph: true
  pagers:
    - colorArgs: always
      pager: delta --dark --paging=never
customCommands:
  - key: "N"
    description: "Create a new branch without checking it out"
    command: "git branch {{index .PromptResponses 0}} {{.SelectedLocalCommit.Sha}}"
    context: "commits"
    prompts:
      - type: "input"
        title: "Branch Name"
        initialValue: ""
  - key: "C"
    description: "AI commit message (Claude)"
    context: "files"
    output: terminal
    command: lazygit-ai-commit.sh
