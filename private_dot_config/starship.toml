[shlvl]
disabled = false
format = 'SHLVL\($shlvl\) '
threshold = 3

[shell]
disabled = false

[directory]
fish_style_pwd_dir_length = 5

[git_commit]
commit_hash_length = 7
only_detached = false
format = "[$hash ]($style)"
style = "bold yellow"

[status]
disabled = false

[sudo]
disabled = false

[direnv]
disabled = false

[env_var.PRESET_MODE]
format = "\nMOD: [$env_value]($style) "
style = "bold dimmed yellow"

[env_var.CUBRID]
format = "CUB: [$env_value]($style) "
style = "bold dimmed yellow"

[env_var.CUBRID_DATABASES]
format = "CUBDB: [$env_value]($style) "
style = "bold dimmed yellow"

# Show JAVA_HOME only when the CUBRID env var is set (env_var can't be
# made conditional, so use a custom module gated by `when`).
[custom.java_home]
description = "Show JAVA_HOME when the CUBRID env var is set"
command = 'echo "$JAVA_HOME"'
when = 'test -n "$CUBRID" && test -n "$JAVA_HOME"'
# Force a POSIX shell: the interactive shell is Nushell, which rejects `&&`.
shell = ["bash", "--noprofile", "--norc"]
format = "JAVA: [$output]($style) "
style = "bold dimmed yellow"

[custom.gcc]
description = "Show GCC version"
command = "echo gcc$(gcc --version | head -n 1 | grep -oE '[0-9]+\\.[0-9]+\\.[0-9]+' | head -n 1)"
detect_files = ['CMakeLists.txt']
style = "green"

[custom.clang]
command = "echo clang$(clang --version | head -n1 | sed -n 's/.*clang version \\([0-9]\\+\\.[0-9]\\+\\.[0-9]\\+\\).*/\\1/p')"
detect_files = ['CMakeLists.txt']
description = "Show Clang version"
style = "green"

[kubernetes]
disabled = false

[os]
disabled = false

