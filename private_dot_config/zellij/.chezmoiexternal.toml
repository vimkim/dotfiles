# Externally-downloaded zellij plugins.
# Paths are relative to ~/.config/zellij/ (the target of this source dir).
# chezmoi fetches these on `chezmoi apply`, so a fresh machine reproduces them
# instead of being hand-downloaded.

["plugins/zellij-vertical-tabs.wasm"]
    type = "file"
    url = "https://github.com/cfal/zellij-vertical-tabs/releases/download/v0.1.0/zellij-vertical-tabs.wasm"
    refreshPeriod = "168h"  # re-check at most weekly

# Status-bar plugin used by every zjstatus layout (vtabs, mycompact, two-by-two,
# two-by-two-claude, claude-vsplit). Pinned to v0.22.0 to match the config
# syntax the layouts were written against.
["plugins/zjstatus.wasm"]
    type = "file"
    url = "https://github.com/dj95/zjstatus/releases/download/v0.22.0/zjstatus.wasm"
    refreshPeriod = "168h"  # re-check at most weekly
